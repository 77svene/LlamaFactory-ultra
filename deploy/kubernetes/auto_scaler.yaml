apiVersion: apps/v1
kind: Deployment
metadata:
  name: llamafactory_ultra-inference
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llamafactory_ultra
      component: inference
  template:
    metadata:
      labels:
        app: llamafactory_ultra
        component: inference
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: model-server
        image: llamafactory_ultra/inference:latest
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: MODEL_PATH
          value: "/models/$(MODEL_NAME)"
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: model-config
              key: model_name
        - name: MAX_BATCH_SIZE
          value: "32"
        - name: MAX_SEQUENCE_LENGTH
          value: "2048"
        - name: GPU_MEMORY_UTILIZATION
          value: "0.9"
        - name: QUANTIZATION
          value: "awq"
        - name: TENSOR_PARALLEL_SIZE
          value: "1"
        resources:
          requests:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "4"
            memory: "16Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /models
          readOnly: true
        - name: shared-memory
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
      - name: shared-memory
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - llamafactory_ultra
                - key: component
                  operator: In
                  values:
                  - inference
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: llamafactory_ultra-inference
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
spec:
  selector:
    app: llamafactory_ultra
    component: inference
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llamafactory_ultra-inference-hpa
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llamafactory_ultra-inference
  minReplicas: 1
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: inference_requests_per_second
      target:
        type: AverageValue
        averageValue: 100
  - type: Pods
    pods:
      metric:
        name: inference_latency_p95_seconds
      target:
        type: AverageValue
        averageValue: 2.0
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: llamafactory_ultra-inference-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: llamafactory_ultra
      component: inference
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: model-config
  namespace: default
data:
  model_name: "llama-2-7b-chat"
  model_version: "v1.0.0"
  deployment_strategy: "rolling"
  gpu_sharing: "true"
  max_gpu_utilization: "0.8"
  cost_optimization: "true"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: llamafactory_ultra-high-priority
value: 1000000
globalDefault: false
description: "High priority class for LlamaFactory-ultra inference workloads"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llamafactory_ultra-inference
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: llamafactory_ultra-inference-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: llamafactory_ultra-inference-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: llamafactory_ultra-inference
  namespace: default
roleRef:
  kind: Role
  name: llamafactory_ultra-inference-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llamafactory_ultra-inference-monitor
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
spec:
  selector:
    matchLabels:
      app: llamafactory_ultra
      component: inference
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scrapeTimeout: 10s
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llamafactory_ultra-gpu-utilization-hpa
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llamafactory_ultra-inference
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Pods
    pods:
      metric:
        name: gpu_utilization_ratio
      target:
        type: AverageValue
        averageValue: 0.8
  - type: Pods
    pods:
      metric:
        name: gpu_memory_used_bytes
      target:
        type: AverageValue
        averageValue: 10737418240
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
      selectPolicy: Min
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: default
spec:
  accessModes:
  - ReadOnlyMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llamafactory_ultra-inference-ingress
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.llamafactory_ultra.ai
    secretName: llamafactory_ultra-tls
  rules:
  - host: api.llamafactory_ultra.ai
    http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: llamafactory_ultra-inference
            port:
              name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llamafactory_ultra-cost-optimization-hpa
  namespace: default
  labels:
    app: llamafactory_ultra
    component: inference
    optimization: cost
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llamafactory_ultra-inference
  minReplicas: 0
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 30
  - type: Pods
    pods:
      metric:
        name: inference_queue_length
      target:
        type: AverageValue
        averageValue: 5
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
      - type: Pods
        value: 1
        periodSeconds: 300
      selectPolicy: Min